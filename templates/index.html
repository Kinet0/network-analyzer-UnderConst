<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Network Threat Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Courier New', monospace; padding: 30px; }
    h1 { color: #58a6ff; font-size: 1.6rem; margin-bottom: 6px; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 30px; }

    .upload-box {
      background: #161b22; border: 2px dashed #30363d;
      border-radius: 10px; padding: 30px; text-align: center; margin-bottom: 30px;
    }
    .upload-box input { display: none; }
    .upload-box label {
      background: #238636; color: #fff; padding: 10px 24px;
      border-radius: 6px; cursor: pointer; font-size: 0.9rem;
    }
    .upload-box label:hover { background: #2ea043; }
    #filename { margin-top: 12px; color: #8b949e; font-size: 0.85rem; }
    #scan-btn {
      margin-top: 16px; background: #1f6feb; color: #fff;
      border: none; padding: 10px 28px; border-radius: 6px;
      cursor: pointer; font-size: 0.9rem; display: none;
    }
    #scan-btn:hover { background: #388bfd; }

    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 18px 24px; flex: 1; min-width: 140px;
    }
    .stat-card .label { font-size: 0.75rem; color: #8b949e; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: bold; color: #58a6ff; }

    .section-title { font-size: 1rem; color: #58a6ff; margin: 24px 0 12px; border-bottom: 1px solid #21262d; padding-bottom: 6px; }

    .alert-card {
      background: #1a0a0a; border-left: 4px solid #f85149;
      border-radius: 6px; padding: 12px 16px; margin-bottom: 10px;
    }
    .alert-card .alert-title { color: #f85149; font-weight: bold; font-size: 0.9rem; }
    .alert-card .alert-detail { color: #8b949e; font-size: 0.82rem; margin-top: 4px; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: #161b22; color: #8b949e; padding: 10px 12px; text-align: left; border-bottom: 1px solid #30363d; }
    td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
    tr:hover td { background: #161b22; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: bold;
    }
    .High { background: #3d1a1a; color: #f85149; }
    .Medium { background: #2d2008; color: #e3b341; }
    .Low { background: #0d2a1a; color: #3fb950; }

    #loader { display: none; text-align: center; color: #58a6ff; padding: 20px; }
    #results { display: none; }
    #error-msg { color: #f85149; margin-top: 12px; font-size: 0.85rem; }
  </style>
</head>
<body>

  <h1>🛡️ Network Threat Dashboard</h1>
  <p class="subtitle">Upload a .pcap file to analyze traffic and detect threats</p>

  <div class="upload-box">
    <input type="file" id="pcap-input" accept=".pcap" />
    <label for="pcap-input">📂 Choose .pcap File</label>
    <div id="filename">No file selected</div>
    <button id="scan-btn">🔍 Run Analysis</button>
    <div id="error-msg"></div>
  </div>

  <div id="loader">⏳ Analyzing packets...</div>

  <div id="results">
    <div class="stats">
      <div class="stat-card"><div class="label">TOTAL PACKETS</div><div class="value" id="stat-packets">—</div></div>
      <div class="stat-card"><div class="label">UNIQUE IPs</div><div class="value" id="stat-ips">—</div></div>
      <div class="stat-card"><div class="label">ALERTS</div><div class="value" id="stat-alerts" style="color:#f85149">—</div></div>
    </div>

    <div class="section-title">🚨 Threat Alerts</div>
    <div id="alerts-container"></div>

    <div class="section-title">📊 IP Traffic Summary</div>
    <table>
      <thead>
        <tr>
          <th>Source IP</th>
          <th>Connections</th>
          <th>Unique Ports</th>
          <th>Risk Level</th>
          <th>Reasons</th>
        </tr>
      </thead>
      <tbody id="ip-table"></tbody>
    </table>
  </div>

  <script>
    const input = document.getElementById("pcap-input");
    const scanBtn = document.getElementById("scan-btn");
    const filename = document.getElementById("filename");
    const loader = document.getElementById("loader");
    const results = document.getElementById("results");
    const errorMsg = document.getElementById("error-msg");

    input.addEventListener("change", () => {
      if (input.files[0]) {
        filename.textContent = input.files[0].name;
        scanBtn.style.display = "inline-block";
        errorMsg.textContent = "";
      }
    });

    scanBtn.addEventListener("click", async () => {
      const file = input.files[0];
      if (!file) return;

      loader.style.display = "block";
      results.style.display = "none";
      errorMsg.textContent = "";
      scanBtn.disabled = true;

      const formData = new FormData();
      formData.append("pcap", file);

      try {
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();

        if (data.error) { errorMsg.textContent = "Error: " + data.error; return; }

        // Stats
        document.getElementById("stat-packets").textContent = data.total_packets.toLocaleString();
        document.getElementById("stat-ips").textContent = data.unique_ips;
        document.getElementById("stat-alerts").textContent = data.alerts.length;

        // Alerts
        const alertsContainer = document.getElementById("alerts-container");
        alertsContainer.innerHTML = data.alerts.length === 0
          ? '<p style="color:#3fb950">✅ No high-risk alerts detected.</p>'
          : data.alerts.map(a => `
              <div class="alert-card">
                <div class="alert-title">⚠️ ${a.src} → Port ${a.port} (${a.service})</div>
                <div class="alert-detail">${a.reason}</div>
              </div>`).join("");

        // IP Table
        const tbody = document.getElementById("ip-table");
        tbody.innerHTML = data.ip_summary.map(row => `
          <tr>
            <td>${row.ip}</td>
            <td>${row.connections}</td>
            <td>${row.unique_ports}</td>
            <td><span class="badge ${row.risk}">${row.risk}</span></td>
            <td style="color:#8b949e;font-size:0.78rem">${row.reasons.join(", ") || "—"}</td>
          </tr>`).join("");

        results.style.display = "block";
      } catch (e) {
        errorMsg.textContent = "Something went wrong. Is the server running?";
      } finally {
        loader.style.display = "none";
        scanBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
